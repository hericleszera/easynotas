<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Instância</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .inst-badge {
      background: #1f6feb;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .inst-title {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-iniciando   { background: #30363d; color: #8b949e; }
    .badge-aguardando  { background: #2d3a1a; color: #f6c90e; }
    .badge-coletando   { background: #1f3a5f; color: #58a6ff; }
    .badge-processando { background: #1a3a2a; color: #3fb950; }
    .badge-concluido   { background: #1a3a2a; color: #3fb950; }
    .badge-erro        { background: #3d1a1a; color: #f85149; }

    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Painel esquerdo: empresas */
    .painel-empresas {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
    }

    .painel-title {
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .emp-list {
      flex: 1;
      overflow-y: auto;
    }

    .emp-list::-webkit-scrollbar { width: 4px; }
    .emp-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .emp-item {
      padding: 8px 12px;
      font-size: 11px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .emp-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #30363d;
      flex-shrink: 0;
    }

    .emp-item.ativa { background: #0d1f3c; color: #58a6ff; }
    .emp-item.ativa .emp-dot { background: #58a6ff; animation: pulse 1s infinite; }
    .emp-item.ok { color: #3fb950; }
    .emp-item.ok .emp-dot { background: #3fb950; }
    .emp-item.erro-emp { color: #f85149; }
    .emp-item.erro-emp .emp-dot { background: #f85149; }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    .emp-nome {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* Painel direito: logs */
    .painel-logs {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .logs-header {
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #484f58;
      font-size: 10px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .btn-clear:hover { color: #8b949e; }

    .logs {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .logs::-webkit-scrollbar { width: 4px; }
    .logs::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .log-line {
      display: flex;
      gap: 10px;
      padding: 2px 12px;
      font-size: 11px;
      line-height: 1.65;
      border-left: 2px solid transparent;
    }
    .log-line:hover { background: #161b22; }
    .log-time { color: #484f58; flex-shrink: 0; font-size: 10px; padding-top: 1px; }
    .log-msg { color: #e6edf3; word-break: break-word; }

    .log-line.success { border-left-color: #3fb950; }
    .log-line.success .log-msg { color: #3fb950; }
    .log-line.warning { border-left-color: #f6c90e; }
    .log-line.warning .log-msg { color: #f6c90e; }
    .log-line.error { border-left-color: #f85149; }
    .log-line.error .log-msg { color: #f85149; }
    .log-line.info { border-left-color: #30363d; }

    /* Barra de ação (continuar login) */
    .action-bar {
      padding: 10px 16px;
      border-top: 1px solid #30363d;
      background: #161b22;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .action-bar.hidden { display: none; }

    .action-msg {
      font-size: 12px;
      color: #f6c90e;
      flex: 1;
    }

    .btn-continuar {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-continuar:hover { background: #2ea043; }
  </style>
</head>
<body>

<header>
  <span class="inst-badge" id="inst-badge">#?</span>
  <span class="inst-title" id="inst-title">Instância</span>
  <span class="status-badge badge-iniciando" id="status-badge">Iniciando</span>
</header>

<div class="body">
  <div class="painel-empresas">
    <div class="painel-title">
      <span>Empresas</span>
      <span id="emp-count">0</span>
    </div>
    <div class="emp-list" id="emp-list">
      <div style="padding:16px 12px;font-size:11px;color:#484f58">Aguardando login...</div>
    </div>
  </div>

  <div class="painel-logs">
    <div class="logs-header">
      <span>Log</span>
      <button class="btn-clear" onclick="document.getElementById('logs').innerHTML=''">limpar</button>
    </div>
    <div class="logs" id="logs"></div>
  </div>
</div>

<div class="action-bar hidden" id="action-bar">
  <span class="action-msg">Selecione o certificado digital no Chrome e clique em Continuar.</span>
  <button class="btn-continuar" onclick="continuar()">Continuar</button>
</div>

<script>
  let instanciaId = null;
  let empresas = [];
  let empresaAtualIdx = -1;
  // track status concluido/erro por empresa
  const empStatus = {};

  function fmt(iso) {
    return new Date(iso).toTimeString().slice(0, 8);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendLog(log) {
    const el = document.getElementById('logs');
    const line = document.createElement('div');
    line.className = `log-line ${log.level || 'info'}`;
    line.innerHTML = `<span class="log-time">${fmt(log.timestamp)}</span><span class="log-msg">${esc(log.message)}</span>`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function statusLabel(s) {
    return { iniciando:'Iniciando', aguardando:'Aguard. login', coletando:'Coletando',
             processando:'Processando', concluido:'Concluído', erro:'Erro' }[s] || s;
  }

  function setBadge(status) {
    const el = document.getElementById('status-badge');
    el.className = `status-badge badge-${status}`;
    el.textContent = statusLabel(status);
  }

  function renderEmpresas() {
    const list = document.getElementById('emp-list');
    document.getElementById('emp-count').textContent = empresas.length;

    if (empresas.length === 0) {
      list.innerHTML = '<div style="padding:16px 12px;font-size:11px;color:#484f58">Aguardando login...</div>';
      return;
    }

    list.innerHTML = '';
    empresas.forEach((emp, i) => {
      const item = document.createElement('div');
      const isAtiva = i === empresaAtualIdx;
      const isOk = empStatus[i] === 'ok';
      const isErro = empStatus[i] === 'erro';
      item.className = `emp-item${isAtiva ? ' ativa' : isOk ? ' ok' : isErro ? ' erro-emp' : ''}`;
      item.id = `emp-${i}`;
      item.innerHTML = `<div class="emp-dot"></div><span class="emp-nome" title="${esc(emp.nome)}">${esc(emp.nome)}</span>`;
      list.appendChild(item);
    });
  }

  function continuar() {
    if (instanciaId === null) return;
    window.api.sendInput(instanciaId, 'continue');
    document.getElementById('action-bar').classList.add('hidden');
  }

  window.api.onSetInstanciaId((id) => {
    instanciaId = id;
    document.getElementById('inst-badge').textContent = `#${id}`;
    document.getElementById('inst-title').textContent = `Instância #${id}`;
    document.title = `Instância #${id}`;
  });

  window.api.onLog((log) => {
    appendLog(log);
  });

  window.api.onEmpresas((lista) => {
    empresas = lista;
    renderEmpresas();
  });

  window.api.onEmpresaProgress(({ index, nome }) => {
    // Marca anterior como concluída se havia uma ativa
    if (empresaAtualIdx >= 0 && empresaAtualIdx !== index) {
      empStatus[empresaAtualIdx] = 'ok';
    }
    empresaAtualIdx = index;
    renderEmpresas();

    // Scroll para empresa ativa
    const el = document.getElementById(`emp-${index}`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  });

  // Mostra barra de ação quando status = aguardando
  window.api.onInstanciasUpdate((lista) => {
    if (!instanciaId) return;
    const inst = lista.find(i => i.id === instanciaId);
    if (!inst) return;
    setBadge(inst.status);

    const bar = document.getElementById('action-bar');
    if (inst.status === 'aguardando') {
      bar.classList.remove('hidden');
    } else {
      bar.classList.add('hidden');
    }
  });
</script>
</body>
</html>
