<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>EasyNotas — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0d0d14;--bg2:#12121c;--bg3:#1a1a27;--bg4:#1f1f2e;
      --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
      --accent:#2563eb;--accent2:#3b82f6;--cyan:#06b6d4;
      --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
      --text:#f0f4ff;--text2:#8892aa;--text3:#4a5568;
      --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
    }
    body{
      background:var(--bg);color:var(--text);
      font-family:'Inter','Segoe UI',system-ui,sans-serif;
      height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;user-select:none;
    }
    /* background glow */
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(37,99,235,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 30%, rgba(6,182,212,.08) 0%, transparent 70%);
    }
    .login-wrap{
      position:relative;z-index:1;
      width:380px;display:flex;flex-direction:column;align-items:center;gap:28px;
    }
    /* LOGO */
    .login-logo{display:flex;flex-direction:column;align-items:center;gap:14px;}
    .login-logo-img{
      width:90px;height:90px;object-fit:contain;border-radius:18px;
      filter:drop-shadow(0 6px 24px rgba(37,99,235,.45));
    }
    .login-logo-name{font-size:22px;font-weight:700;letter-spacing:-.5px;}
    .login-logo-name span{color:var(--cyan);}
    .login-logo-sub{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:-4px;}
    /* CARD */
    .login-card{
      width:100%;background:var(--bg2);border:1px solid var(--border2);
      border-radius:16px;padding:28px 28px 24px;
      box-shadow:0 8px 40px rgba(0,0,0,.4);
    }
    .login-card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
    .login-card-sub{font-size:12px;color:var(--text3);margin-bottom:22px;}
    /* FIELDS */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .field label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.3px;text-transform:uppercase;}
    .field-wrap{position:relative;}
    .field-wrap svg{
      position:absolute;left:11px;top:50%;transform:translateY(-50%);
      color:var(--text3);pointer-events:none;flex-shrink:0;
    }
    .field input{
      width:100%;background:var(--bg3);border:1px solid var(--border2);
      border-radius:9px;padding:10px 12px 10px 36px;
      font-size:13px;color:var(--text);font-family:inherit;outline:none;
      transition:border .15s,box-shadow .15s;
    }
    .field input::placeholder{color:var(--text3);}
    .field input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }
    /* ERRO */
    .login-error{
      display:none;align-items:flex-start;gap:8px;
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
      border-radius:9px;padding:10px 12px;margin-bottom:14px;
    }
    .login-error.show{display:flex;}
    .login-error-icon{color:var(--red);flex-shrink:0;margin-top:1px;}
    .login-error-text{font-size:12px;color:#fca5a5;line-height:1.5;}
    /* LICENCA EXPIRADA */
    .licenca-banner{
      display:none;flex-direction:column;align-items:center;gap:10px;
      background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);
      border-radius:9px;padding:16px;margin-bottom:14px;text-align:center;
    }
    .licenca-banner.show{display:flex;}
    .licenca-banner-icon{color:var(--yellow);font-size:22px;}
    .licenca-banner-title{font-size:13px;font-weight:700;color:#fcd34d;}
    .licenca-banner-msg{font-size:12px;color:#d1b06b;line-height:1.6;}
    .licenca-banner-contact{
      margin-top:4px;font-size:11px;color:var(--text3);
      background:var(--bg3);padding:6px 12px;border-radius:7px;
      border:1px solid var(--border);
    }
    /* BTN */
    .btn-login{
      width:100%;padding:11px;border-radius:9px;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--accent) 0%,var(--cyan) 100%);
      color:#fff;font-size:13px;font-weight:700;font-family:inherit;
      letter-spacing:.2px;transition:opacity .15s,transform .1s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:4px;
    }
    .btn-login:hover{opacity:.9;}
    .btn-login:active{transform:scale(.98);}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .btn-login .spinner{
      width:14px;height:14px;border-radius:50%;
      border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
      animation:spin .7s linear infinite;display:none;
    }
    .btn-login.loading .btn-text{display:none;}
    .btn-login.loading .spinner{display:block;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* FOOTER */
    .login-footer{font-size:10px;color:var(--text3);text-align:center;letter-spacing:.3px;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <img src="../logo.png" class="login-logo-img" alt="EasyNotas" />
    <div class="login-logo-name">Easy<span>Notas</span></div>
    <div class="login-logo-sub">Automação SEFAZ-AM</div>
  </div>

  <div class="login-card">
    <div class="login-card-title">Bem-vindo de volta</div>
    <div class="login-card-sub">Entre com suas credenciais para continuar</div>

    <!-- Erro genérico -->
    <div class="login-error" id="login-error">
      <svg class="login-error-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span class="login-error-text" id="login-error-text"></span>
    </div>

    <!-- Licença expirada -->
    <div class="licenca-banner" id="licenca-banner">
      <div class="licenca-banner-icon">⚠️</div>
      <div class="licenca-banner-title">Licença Expirada</div>
      <div class="licenca-banner-msg">Seu acesso ao EasyNotas foi bloqueado pois sua licença expirou.</div>
      <div class="licenca-banner-contact">Entre em contato com o suporte para renovar</div>
    </div>

    <div class="field">
      <label>Usuário</label>
      <div class="field-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="inp-user" placeholder="seu.usuario" autocomplete="username" />
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="field-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="fazerLogin()">
      <span class="btn-text">Entrar</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="login-footer">EasyNotas v1.0.0 &nbsp;·&nbsp; Todos os direitos reservados</div>
</div>

<script>
const inpUser = document.getElementById('inp-user');
const inpPass = document.getElementById('inp-pass');
const btnLogin = document.getElementById('btn-login');
const errorBox = document.getElementById('login-error');
const errorText = document.getElementById('login-error-text');
const licencaBanner = document.getElementById('licenca-banner');

// Enter no campo de senha dispara login
inpPass.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
inpUser.addEventListener('keydown', e => { if (e.key === 'Enter') inpPass.focus(); });

// Verifica sessão salva ao abrir
window.addEventListener('DOMContentLoaded', async () => {
  const session = await window.api.getSession();
  if (!session || !session.token) return;

  // Revalida no servidor
  setLoading(true);
  const res = await window.api.verificarToken(session.token);
  setLoading(false);

  if (res.status === 200) {
    await window.api.irDashboard({ token: session.token, username: res.body.username, diasRestantes: res.body.diasRestantes });
  } else if (res.body && res.body.error === 'licenca_expirada') {
    mostrarLicencaExpirada();
  }
  // token inválido: fica na tela de login normalmente
});

function setLoading(on) {
  btnLogin.disabled = on;
  btnLogin.classList.toggle('loading', on);
}

function mostrarErro(msg) {
  errorText.textContent = msg;
  errorBox.classList.add('show');
  licencaBanner.classList.remove('show');
}

function mostrarLicencaExpirada() {
  licencaBanner.classList.add('show');
  errorBox.classList.remove('show');
  btnLogin.disabled = true;
}

function limparErros() {
  errorBox.classList.remove('show');
  licencaBanner.classList.remove('show');
}

async function fazerLogin() {
  const username = inpUser.value.trim();
  const password = inpPass.value;

  if (!username || !password) { mostrarErro('Preencha usuário e senha.'); return; }

  limparErros();
  setLoading(true);

  const res = await window.api.login(username, password);
  setLoading(false);

  if (res.status === 200) {
    const { token, username: user, diasRestantes } = res.body;
    await window.api.irDashboard({ token, username: user, diasRestantes });
  } else if (res.body && res.body.error === 'licenca_expirada') {
    mostrarLicencaExpirada();
  } else {
    mostrarErro(res.body?.error || 'Erro ao conectar com o servidor.');
  }
}
</script>
</body>
</html>
