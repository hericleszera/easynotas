<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1628"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="rounded">
      <rect width="256" height="256" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="80" cy="80" rx="90" ry="90" fill="#2563eb" opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="180" cy="180" rx="70" ry="70" fill="#06b6d4" opacity="0.1" filter="url(#blur1)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="76" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Center hex shape -->
  <polygon points="128,48 196,88 196,168 128,208 60,168 60,88" fill="url(#glow)" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>

  <!-- EN letters -->
  <!-- E -->
  <g fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="88" y1="96" x2="88" y2="160"/>
    <line x1="88" y1="96" x2="116" y2="96"/>
    <line x1="88" y1="128" x2="112" y2="128"/>
    <line x1="88" y1="160" x2="116" y2="160"/>
  </g>
  <!-- N -->
  <g fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="124" y1="96" x2="124" y2="160"/>
    <line x1="124" y1="96" x2="148" y2="160"/>
    <line x1="148" y1="96" x2="148" y2="160"/>
  </g>

  <!-- Corner dots -->
  <circle cx="128" cy="44" r="4" fill="url(#accent)" opacity="0.8"/>
  <circle cx="196" cy="84" r="3" fill="url(#accent)" opacity="0.6"/>
  <circle cx="196" cy="172" r="3" fill="url(#accent)" opacity="0.6"/>
  <circle cx="128" cy="212" r="4" fill="url(#accent)" opacity="0.8"/>
  <circle cx="60" cy="172" r="3" fill="url(#accent)" opacity="0.6"/>
  <circle cx="60" cy="84" r="3" fill="url(#accent)" opacity="0.6"/>
</svg>